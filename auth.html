<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracium — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue:#0047CC;--blue-dark:#003399;--blue-light:#EEF3FF;
  --green:#00A550;--red:#E8001C;
  --text:#0D1117;--text2:#4A5568;--text3:#718096;
  --bg:#F7F9FC;--white:#FFFFFF;--border:#E2E8F0;
}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:white;}
.logo-name{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--text);}

/* HERO */
.auth-hero{
  background:linear-gradient(135deg,#0D1B40,#0047CC);
  padding:32px 24px;color:white;text-align:center;
}
.auth-hero h1{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:800;margin-bottom:8px;}
.auth-hero p{font-size:14px;opacity:0.8;line-height:1.6;}
.hero-features{display:flex;justify-content:center;gap:16px;margin-top:16px;flex-wrap:wrap;}
.hero-feat{font-size:13px;opacity:0.9;display:flex;align-items:center;gap:6px;}

/* FORM CONTAINER */
.auth-container{max-width:420px;margin:0 auto;padding:24px 16px;width:100%;}

/* TABS */
.auth-tabs{display:flex;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px;}
.auth-tab{
  flex:1;padding:10px;border:none;border-radius:8px;
  background:transparent;font-size:14px;font-weight:600;
  color:var(--text3);cursor:pointer;transition:all 0.2s;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.auth-tab.active{background:var(--blue);color:white;}

/* CARD */
.auth-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px;}

/* FORM */
.form-group{margin-bottom:16px;}
.form-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{
  width:100%;padding:13px 16px;
  border:2px solid var(--border);border-radius:10px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;
  color:var(--text);outline:none;transition:border-color 0.2s;
}
.form-input:focus{border-color:var(--blue);}

/* BOUTON */
.btn-submit{
  width:100%;padding:14px;border:none;border-radius:10px;
  background:var(--blue);color:white;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:16px;font-weight:700;cursor:pointer;
  transition:all 0.2s;margin-top:8px;
}
.btn-submit:hover{background:var(--blue-dark);}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;}

/* ALERT */
.alert{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none;}
.alert.error{background:#FFF0F0;border:1px solid rgba(232,0,28,0.2);color:var(--red);}
.alert.success{background:#F0FFF6;border:1px solid rgba(0,165,80,0.2);color:var(--green);}
.alert.show{display:block;}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text3);font-size:13px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* PAGE */
.page{display:none;}
.page.active{display:block;}
</style>
</head>
<body>

<header>
  <div class="logo-icon">T</div>
  <div class="logo-name">Tracium</div>
</header>

<div class="auth-hero">
  <h1>🔴 One-Click Security</h1>
  <p>Protégez votre véhicule instantanément.<br>IA embarquée · GPS · Anti-redémarrage.</p>
  <div class="hero-features">
    <div class="hero-feat">✅ Tracium Scan</div>
    <div class="hero-feat">✅ Tracium Locate</div>
    <div class="hero-feat">✅ Tracium ID</div>
    <div class="hero-feat">✅ Tracium DNA</div>
  </div>
</div>

<div class="auth-container">

  <div class="auth-tabs">
    <button class="auth-tab active" onclick="showPage('login')">Connexion</button>
    <button class="auth-tab" onclick="showPage('register')">Inscription</button>
  </div>

  <!-- CONNEXION -->
  <div class="page active" id="page-login">
    <div class="auth-card">
      <div class="alert error" id="loginError"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="votre@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="btn-submit" id="loginBtn" onclick="doLogin()">Se connecter</button>
      <div style="text-align:center;margin-top:16px;">
        <a href="#" onclick="showPage('reset')" style="font-size:13px;color:var(--blue);text-decoration:none;">Mot de passe oublié ?</a>
      </div>
    </div>
  </div>

  <!-- INSCRIPTION -->
  <div class="page" id="page-register">
    <div class="auth-card">
      <div class="alert error" id="registerError"></div>
      <div class="form-group">
        <label class="form-label">Nom complet</label>
        <input class="form-input" type="text" id="registerName" placeholder="Jean-Paul Mballa">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="registerEmail" placeholder="votre@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Téléphone</label>
        <input class="form-input" type="tel" id="registerPhone" placeholder="+237 6XX XXX XXX">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" type="password" id="registerPassword" placeholder="Minimum 6 caractères">
      </div>
      <button class="btn-submit" id="registerBtn" onclick="doRegister()">Créer mon compte</button>
    </div>
  </div>

  <!-- RESET -->
  <div class="page" id="page-reset">
    <div class="auth-card">
      <div class="alert error" id="resetError"></div>
      <div class="alert success" id="resetSuccess"></div>
      <div style="margin-bottom:16px;">
        <div style="font-size:16px;font-weight:700;margin-bottom:8px;">Réinitialiser le mot de passe</div>
        <div style="font-size:14px;color:var(--text2);">Entrez votre email — vous recevrez un lien de réinitialisation.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="resetEmail" placeholder="votre@email.com">
      </div>
      <button class="btn-submit" onclick="doReset()">Envoyer le lien</button>
      <button onclick="showPage('login')" style="width:100%;padding:12px;margin-top:8px;background:none;border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;color:var(--text2);">← Retour</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyATWUfF5OFw860JXw76Uo9G_0jAI6hF6WE",
  authDomain: "ambera-ai.firebaseapp.com",
  projectId: "ambera-ai",
  storageBucket: "ambera-ai.firebasestorage.app",
  messagingSenderId: "581529826084",
  appId: "1:581529826084:web:144a6ce179e0d8286979b1"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Si déjà connecté → rediriger
onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = '/app';
});

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (page === 'login') document.querySelectorAll('.auth-tab')[0].classList.add('active');
  if (page === 'register') document.querySelectorAll('.auth-tab')[1].classList.add('active');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  if (!email || !password) { errEl.textContent = 'Remplissez tous les champs.'; errEl.classList.add('show'); return; }

  btn.disabled = true; btn.textContent = 'Connexion...';
  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = '/app';
  } catch(e) {
    errEl.textContent = e.code === 'auth/invalid-credential' ? 'Email ou mot de passe incorrect.' : 'Erreur de connexion. Réessayez.';
    errEl.classList.add('show');
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
}

async function doRegister() {
  const name = document.getElementById('registerName').value.trim();
  const email = document.getElementById('registerEmail').value.trim();
  const phone = document.getElementById('registerPhone').value.trim();
  const password = document.getElementById('registerPassword').value;
  const errEl = document.getElementById('registerError');
  const btn = document.getElementById('registerBtn');

  if (!name || !email || !password) { errEl.textContent = 'Remplissez tous les champs obligatoires.'; errEl.classList.add('show'); return; }
  if (password.length < 6) { errEl.textContent = 'Le mot de passe doit avoir au moins 6 caractères.'; errEl.classList.add('show'); return; }

  btn.disabled = true; btn.textContent = 'Création...';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, 'users', cred.user.uid), {
      uid: cred.user.uid, name, email, phone,
      createdAt: serverTimestamp(), role: 'client'
    });
    window.location.href = '/app';
  } catch(e) {
    errEl.textContent = e.code === 'auth/email-already-in-use' ? 'Cet email est déjà utilisé.' : 'Erreur lors de la création. Réessayez.';
    errEl.classList.add('show');
    btn.disabled = false; btn.textContent = 'Créer mon compte';
  }
}

async function doReset() {
  const email = document.getElementById('resetEmail').value.trim();
  const errEl = document.getElementById('resetError');
  const succEl = document.getElementById('resetSuccess');
  if (!email) { errEl.textContent = 'Entrez votre email.'; errEl.classList.add('show'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    succEl.textContent = '✅ Lien envoyé ! Vérifiez votre email.';
    succEl.classList.add('show');
    errEl.classList.remove('show');
  } catch(e) {
    errEl.textContent = 'Email non trouvé.'; errEl.classList.add('show');
  }
}

window.showPage = showPage;
window.doLogin = doLogin;
window.doRegister = doRegister;
window.doReset = doReset;
</script>
</body>
</html>
